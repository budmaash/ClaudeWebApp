{% extends 'base.html' %}
{% block title %}Welcome · SAT Math Score Tool{% endblock %}
{% block content %}
  <style>
    .onboarding-panel {
      width: min(600px, 92vw);
      margin: clamp(110px, 13vh, 170px) auto 2rem;
      background: #fff;
      border: 1px solid #e2ddd3;
      border-radius: 1.25rem;
      box-shadow: 0 18px 45px rgba(17, 17, 17, 0.08);
      padding: clamp(1.5rem, 4vw, 2.75rem);
    }

    .onboarding-panel h2 {
      margin-top: 0;
      font-size: 2rem;
      color: #151515;
    }

    .onboarding-panel p {
      color: #4f4f4f;
      margin: 0 0 1.5rem;
    }

    .onboarding-field {
      display: flex;
      flex-direction: column;
      margin-bottom: 1.2rem;
    }

    .onboarding-field label {
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
      color: #151515;
    }

    .onboarding-field input {
      padding: 0.85rem 0.95rem;
      border-radius: 0.85rem;
      border: 1px solid #e2ddd3;
      background: #fbfaf7;
      font-size: 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .onboarding-field input:focus {
      outline: none;
      border-color: #c6a764;
      box-shadow: 0 0 0 3px rgba(198, 167, 100, 0.25);
    }

    .onboarding-actions {
      margin-top: 1.5rem;
    }

    @media (max-width: 640px) {
      .onboarding-panel {
        width: 100%;
        margin-top: 110px;
      }
    }
  </style>

  <section class="card onboarding-panel">
    <h2>Welcome! Tell us your name.</h2>
    <p>We need your name to track your progress.</p>

    <form method="post" action="{{ url_for('onboarding_post') }}">
      <div class="onboarding-field">
        <label for="first_name">First Name</label>
        <input
          type="text"
          id="first_name"
          name="first_name"
          placeholder="First name"
          maxlength="255"
          required
          autofocus
        />
      </div>

      <div class="onboarding-field">
        <label for="last_name">Last Name</label>
        <input
          type="text"
          id="last_name"
          name="last_name"
          placeholder="Last name"
          maxlength="255"
          required
        />
      </div>

      <div class="onboarding-actions">
        <button
          type="submit"
          class="btn btn--border theme-btn--primary-inverse sqs-button-element--tertiary"
          style="width: 214px; height: 60px;"
        >
          Continue
        </button>
      </div>
    </form>
  </section>
{% endblock %}
