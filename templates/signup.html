{% extends 'base.html' %}
{% block title %}Select Test · SAT Math Score Tool{% endblock %}
{% block content %}
  <style>
    .begin-scoring-panel {
      width: min(980px, 92vw);
      margin: clamp(110px, 13vh, 170px) auto 2rem;
      background: #fff;
      border: 1px solid #e2ddd3;
      border-radius: 1.25rem;
      box-shadow: 0 18px 45px rgba(17, 17, 17, 0.08);
      padding: clamp(1.5rem, 4vw, 2.75rem);
      margin-bottom: 2rem;
    }

    .begin-scoring-panel h2 {
      margin-top: 0;
    }

    .begin-scoring-panel .lead {
      margin: 0 0 1.2rem;
    }

    .signup-shell {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .signup-section-copy {
      margin: 0;
      color: #4f4f4f;
    }

    .signup-subcard {
      border: 1px solid #2a2a2a;
      border-radius: 0.95rem;
      padding: clamp(1.5rem, 3vw, 2.5rem);
      background: #fff;
    }

    .signup-subcard h3 {
      margin: 0 0 0.9rem;
      font-size: 2rem;
      line-height: 1.1;
      color: #151515;
    }

    .login-subcard-actions {
      display: flex;
      justify-content: flex-start;
    }

    .signup-subcard .start-answers-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 214px;
      height: 60px;
      box-sizing: border-box;
      text-align: center;
    }

    @media (max-width: 640px) {
      .begin-scoring-panel {
        width: 100%;
        margin-top: 110px;
      }

      .signup-subcard .start-answers-btn {
        width: 100%;
        height: 60px;
      }
    }
  </style>

  <section class="card begin-scoring-panel">
    <div class="signup-shell">
      <p class="signup-section-copy">Sign Up to use services</p>

      <div class="signup-subcard">
        <h3>Sign Up</h3>
        <div class="login-subcard-actions">
          <a href="{{ url_for('auth_signup') }}" class="start-answers-btn btn btn--border theme-btn--primary-inverse sqs-button-element--tertiary">Sign Up</a>
        </div>
      </div>

      <p class="signup-section-copy">Already a Member? Log In to your account</p>

      <div class="signup-subcard">
        <h3>Log In</h3>
        <div class="login-subcard-actions">
          <a href="{{ url_for('auth_login') }}" class="start-answers-btn btn btn--border theme-btn--primary-inverse sqs-button-element--tertiary">Log In</a>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
